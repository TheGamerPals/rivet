name: Rivet
options:
  bundleIdPrefix: com.rivetapp
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.29.3
targets:
  Rivet:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/RivetApp
      - path: Resources
    dependencies:
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rivetapp.Rivet
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
  RivetTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/RivetTests
    dependencies:
      - target: Rivet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rivetapp.RivetTests
        GENERATE_INFOPLIST_FILE: YES
