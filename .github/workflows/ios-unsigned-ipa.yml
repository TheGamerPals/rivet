name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app || true
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/Rivet
        run: xcodegen generate

      - name: Resolve packages
        working-directory: ios/Rivet
        run: xcodebuild -resolvePackageDependencies -project Rivet.xcodeproj -scheme Rivet

      - name: Archive unsigned app
        working-directory: ios/Rivet
        run: |
          xcodebuild archive \
            -project Rivet.xcodeproj \
            -scheme Rivet \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/Rivet.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_INSTALL=NO

      - name: Package unsigned IPA
        working-directory: ios/Rivet
        run: |
          rm -rf build/Payload build/Rivet-unsigned.ipa
          mkdir -p build/Payload
          cp -R build/Rivet.xcarchive/Products/Applications/Rivet.app build/Payload/
          ditto -c -k --keepParent build/Payload build/Rivet-unsigned.ipa
          ls -lh build/Rivet-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Rivet-unsigned-ipa
          path: ios/Rivet/build/Rivet-unsigned.ipa

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: Rivet-xcarchive
          path: ios/Rivet/build/Rivet.xcarchive
